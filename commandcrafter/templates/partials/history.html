<section class="history" x-data="historyView()">
  <header class="builder-header">
    <div>
      <h2 class="title">Command History</h2>
      <p class="muted">Your 50 most recently generated commands. Stored in your browser.</p>
    </div>
    <button type="button" class="btn btn-danger" x-show="entries.length" @click="clearAll()">Clear History</button>
  </header>

  <template x-if="entries.length === 0">
    <p class="muted center">Your command history is empty. Generate a command to see it here.</p>
  </template>

  <div class="command-list">
    <template x-for="entry in entries" :key="entry.id">
      <article class="command-item">
        <div class="meta">
          <span class="badge" x-text="entry.type"></span>
          <span class="muted small" x-text="formatTime(entry.timestamp)"></span>
        </div>
        <pre><code x-text="entry.command"></code></pre>
        <div class="actions">
          <button class="btn btn-icon" @click="favorite(entry)">★</button>
          <button class="btn btn-icon" @click="copy(entry.command)">Copy</button>
        </div>
      </article>
    </template>
  </div>
</section>
