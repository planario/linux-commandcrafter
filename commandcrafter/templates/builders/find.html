<div class="field">
  <label>Starting Path</label>
  <input type="text" name="path" value="{{ ctx.path }}" placeholder="e.g., /home/user">
  <p class="muted small">The directory where the search begins.</p>
</div>
<div class="grid-2">
  <div class="field">
    <label>Name Pattern</label>
    <input type="text" name="name_pattern" value="{{ ctx.name_pattern }}" placeholder="*.log">
  </div>
  <div class="field">
    <label>Type</label>
    <select name="type">
      <option value="any" {% if ctx.type == 'any' %}selected{% endif %}>Any</option>
      <option value="f"   {% if ctx.type == 'f'   %}selected{% endif %}>File (f)</option>
      <option value="d"   {% if ctx.type == 'd'   %}selected{% endif %}>Directory (d)</option>
      <option value="l"   {% if ctx.type == 'l'   %}selected{% endif %}>Symlink (l)</option>
    </select>
  </div>
</div>
<label class="check-row"><input type="checkbox" name="case_insensitive"> <span>Case-insensitive (<code>-iname</code>)</span></label>
