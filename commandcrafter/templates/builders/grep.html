<div class="grid-2">
  <div class="field">
    <label>Pattern</label>
    <input type="text" name="pattern" value="{{ ctx.pattern }}" placeholder="Text or Regex">
    <p class="muted small">The text or regular expression to match.</p>
  </div>
  <div class="field">
    <label>Path</label>
    <input type="text" name="path" value="{{ ctx.path }}" placeholder="/path/to/search">
    <p class="muted small">The file or directory to search.</p>
  </div>
</div>

<h3 class="subtitle">Options</h3>
<div class="grid-2">
  <label class="check-row"><input type="checkbox" name="recursive">     <span>Recursive <code>-r</code></span></label>
  <label class="check-row"><input type="checkbox" name="ignore_case">   <span>Case-insensitive <code>-i</code></span></label>
  <label class="check-row"><input type="checkbox" name="invert">        <span>Invert match <code>-v</code></span></label>
  <label class="check-row"><input type="checkbox" name="files_only">    <span>Files with matches <code>-l</code></span></label>
  <label class="check-row"><input type="checkbox" name="line_numbers">  <span>Line numbers <code>-n</code></span></label>
  <label class="check-row"><input type="checkbox" name="whole_word">    <span>Whole words <code>-w</code></span></label>
</div>
