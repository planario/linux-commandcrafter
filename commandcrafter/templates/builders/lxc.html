<div class="grid-2">
  <div class="field">
    <label>Image</label>
    <input type="text" name="image" value="{{ ctx.image }}" placeholder="ubuntu:22.04">
  </div>
  <div class="field">
    <label>Container name</label>
    <input type="text" name="container_name" value="{{ ctx.container_name }}">
  </div>
</div>
<div class="grid-3">
  <div class="field">
    <label>CPU cores</label>
    <input type="number" name="cores" placeholder="2">
  </div>
  <div class="field">
    <label>RAM (MB)</label>
    <input type="number" name="ram" placeholder="1024">
  </div>
  <div class="field">
    <label>Storage (GB)</label>
    <input type="number" name="storage" placeholder="10">
  </div>
</div>
