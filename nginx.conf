server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets indefinitely
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Security headers ────────────────────────────────────────────────────────

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop browsers from MIME-sniffing the content type
    add_header X-Content-Type-Options "nosniff" always;

    # Legacy XSS filter (belt-and-suspenders; modern browsers rely on CSP instead)
    add_header X-XSS-Protection "1; mode=block" always;

    # Limit referrer information sent to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy
    # - default-src 'self'              : only load resources from the same origin
    # - script-src 'self' 'unsafe-inline': React/Vite bundles need inline scripts
    # - style-src 'self' 'unsafe-inline' : TailwindCSS uses inline styles
    # - connect-src 'self' https://generativelanguage.googleapis.com
    #     The Gemini API is the only external endpoint the app calls
    # - img-src 'self' data:            : data URIs used by some SVG icons
    # - font-src 'self'                 : local fonts only
    # - object-src 'none'              : disallow plugins (Flash, etc.)
    # - base-uri 'self'                : prevent base-tag hijacking
    # - form-action 'self'             : prevent form submissions to external sites
    # - frame-ancestors 'self'         : secondary clickjacking guard
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    # Disable access to device sensors and other powerful browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # ─────────────────────────────────────────────────────────────────────────────

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
