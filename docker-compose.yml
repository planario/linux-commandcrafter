services:
  commandcrafter:
    build: .
    container_name: linux-command-crafter
    ports:
      - "7256:7256"
    env_file:
      - .env
    environment:
      PORT: "7256"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7256/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
